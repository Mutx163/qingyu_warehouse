name: 同步上游教务适配

# Selectively sync new schools from shiguang_warehouse with compatibility checks.
# Uses the default GITHUB_TOKEN (same repository — no extra secret required).

on:
  schedule:
    # 每天 09:00（北京时间）
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync-upstream:
    if: github.repository == 'Mutx163/qingyu_warehouse'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行兼容性单元测试
        run: python tests/test_warehouse_upstream_compat.py -v

      - name: 同步上游适配（带校验）
        id: sync
        env:
          CI: "true"
        run: |
          set +e
          python scripts/sync_upstream.py
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 3 ]; then
            echo "::error::上游同步被兼容性校验阻止，未修改任何文件。"
            exit 3
          fi
          if [ "$code" -eq 4 ]; then
            echo "::error::上游同步因警告项停止；人工确认后可本地加 --ignore-warnings。"
            exit 4
          fi
          if [ "$code" -ne 0 ]; then
            echo "::error::上游同步失败，exit code $code"
            exit "$code"
          fi
